# Publish to npm via Trusted Publishers (OIDC) — no token needed.
# Requires one-time setup on npmjs.com: Package Settings → Trusted Publisher → GitHub Actions
#   Organization or user: chensid
#   Repository: react-use-echarts
#   Workflow filename: npm-publish.yml

name: Publish to NPM

on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for OIDC trusted publishing
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - name: Enable pnpm via corepack
        run: corepack enable

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Build package
        run: vp pack

      - name: Publish to NPM
        run: npm publish --provenance --access public
