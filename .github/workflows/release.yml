# Changesets-driven release pipeline (single source of release truth).
#
# On every push to `main`, changesets/action either:
#   1. Opens (or updates) a "Version Packages" PR aggregating all unreleased
#      `.changeset/*.md` entries, OR
#   2. If that PR has just been merged (no remaining changesets), runs the
#      `release` script — which builds and publishes via OIDC trusted
#      publishing.
#
# Hotfixes follow the same flow: a PR with a changeset, then merge the
# resulting Version Packages PR.

name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    # Only run on the canonical repo so forks don't try to publish.
    if: github.repository == 'chensid/react-use-echarts'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write # Required for OIDC trusted publishing
    env:
      NPM_CONFIG_PROVENANCE: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          # `vp run <script>` dispatches to package.json scripts:
          # version → `changeset version` (bumps + writes CHANGELOG)
          # release → `vp pack && changeset publish` (builds + npm publish via OIDC)
          version: vp run version
          publish: vp run release
          commit: "chore: release"
          title: "chore: release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
