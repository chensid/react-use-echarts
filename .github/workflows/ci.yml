name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    concurrency:
      group: ci-${{ github.ref }}-${{ matrix.node }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        node: ["22", "24"]
    steps:
      - uses: actions/checkout@v7

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: ${{ matrix.node }}
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Static checks
        run: vp check

      - name: Build library
        run: vp pack

      - name: Test with coverage (unit project)
        run: vp test run --coverage --project unit

      - name: Install Playwright Chromium
        if: matrix.node == '24'
        run: vp exec playwright install --with-deps chromium

      - name: Test (browser project)
        if: matrix.node == '24'
        run: vp test run --project browser

      - name: Bundle size budget
        if: matrix.node == '24'
        run: vp run size

      - name: Upload coverage to Codecov
        if: matrix.node == '24'
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  release:
    # Only publish after the canonical repo's main-branch quality matrix passes.
    if: github.event_name == 'push' && github.repository == 'chensid/react-use-echarts'
    needs: test
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
      id-token: write # Required for OIDC trusted publishing
    env:
      NPM_CONFIG_PROVENANCE: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          # `vp run <script>` dispatches to package.json scripts:
          # version → `changeset version` (bumps + writes CHANGELOG)
          # release → `changeset publish`; prepublishOnly packs once before npm publish
          version: vp run version
          publish: vp run release
          commit: "chore: release"
          title: "chore: release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
