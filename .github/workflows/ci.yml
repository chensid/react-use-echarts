name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["22", "24"]
    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: ${{ matrix.node }}
          cache: true

      # `vp pack` shells out to pnpm while creating the package tarball.
      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Static checks
        run: vp check

      - name: Build library
        run: vp pack

      # `vp pack` already runs publint + attw, but surfacing them as a dedicated
      # step keeps package-export regressions out of the pack log and visible in
      # the PR checks UI. Match `vp pack`'s `attw: { profile: "esm-only" }`
      # config in vite.config.ts — the library has been ESM-only since 1.3.0,
      # so checking node10 resolutions is out of scope and would always fail
      # for the `/core` and `/themes/registry` subpath exports.
      - name: Verify published package (publint + attw)
        run: |
          pnpm exec publint
          pnpm exec attw --pack . --profile esm-only

      - name: Test with coverage (unit project)
        run: vp test run --coverage --project unit

      - name: Install Playwright Chromium
        if: matrix.node == '24'
        run: vp exec playwright install --with-deps chromium

      - name: Test (browser project)
        if: matrix.node == '24'
        run: vp test run --project browser

      - name: Bundle size budget
        if: matrix.node == '24'
        run: vp run size

      - name: Upload coverage to Codecov
        if: matrix.node == '24'
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false
